<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; }
        nav { background: #333; padding: 0; display: flex; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; padding: 15px 20px; display: inline-block; text-decoration: none; transition: background 0.3s; }
        nav a:hover { background: #555; }
        .content { padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { margin-bottom: 20px; text-align: center; }
        .form-group { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #fff; }
        input, select { 
            padding: 10px; 
            width: 100%; 
            background: #2a2a2a; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }
        button { 
            background: #00d4ff; 
            color: #1a1a1a; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
            font-size: 16px;
        }
        button:hover { 
            background: #00b0cc;
        }
        .settings-section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .settings-section h2 {
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 18px;
        }
        .status-banner {
            margin-bottom: 20px;
            padding: 12px 14px;
            border-radius: 4px;
            background: #2a2a2a;
            border-left: 4px solid #00d4ff;
            color: #ddd;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" title="Go to the main dashboard">Dashboard</a>
        <a href="/tracking" title="Open the satellite tracking page">Tracking</a>
        <a href="/cameras" title="Open the camera feeds page">Cameras</a>
        <a href="/gallery" title="Open the snapshot gallery">Gallery</a>
        <a href="/settings" title="Open the settings page">Settings</a>
        <a href="/logs" title="Open the system logs">Logs</a>
    </nav>

    <div class="content">
        <h1>⚙️ Settings</h1>
        <div class="status-banner" id="settings-status">Settings are loaded from integration settings.</div>
        
        <div class="settings-section">
            <h2>General Settings</h2>
            <form id="general-settings-form">
                <div class="form-group">
                    <label for="update-interval">Update Interval (seconds)</label>
                    <input type="number" id="update-interval" value="2" min="1">
                </div>
                <div class="form-group">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <button type="submit" title="Save the general settings">Save Settings</button>
            </form>
        </div>

        <div class="settings-section">
            <h2>Receiver Configuration</h2>
            <form id="receiver-settings-form">
                <div class="form-group">
                    <label for="receiver-frequency">Frequency (MHz)</label>
                    <input type="number" id="receiver-frequency" value="145.800" step="0.001">
                </div>
                <div class="form-group">
                    <label for="receiver-modulation">Modulation</label>
                    <select id="receiver-modulation">
                        <option value="FM">FM</option>
                        <option value="AM">AM</option>
                        <option value="SSB">SSB</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="receiver-bandwidth">Bandwidth (kHz)</label>
                    <input type="number" id="receiver-bandwidth" value="25" min="0.1" step="0.1">
                </div>
                <button type="submit" title="Save the receiver configuration">Save Receiver Config</button>
            </form>
        </div>

        <div class="settings-section">
            <h2>Transmitter Configuration</h2>
            <form id="transmitter-settings-form">
                <div class="form-group">
                    <label for="transmitter-frequency">Frequency (MHz)</label>
                    <input type="number" id="transmitter-frequency" value="145.200" step="0.001">
                </div>
                <div class="form-group">
                    <label for="transmitter-power">Power Output (Watts)</label>
                    <input type="number" id="transmitter-power" value="10" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label for="transmitter-status">Status</label>
                    <select id="transmitter-status">
                        <option value="Standby">Standby</option>
                        <option value="Active">Active</option>
                    </select>
                </div>
                <button type="submit" title="Save the transmitter configuration">Save Transmitter Config</button>
            </form>
        </div>
    </div>

    <script>
        function setStatus(message, isError = false) {
            const banner = document.getElementById('settings-status');
            banner.textContent = message;
            banner.style.borderLeftColor = isError ? '#ff6b6b' : '#00d4ff';
        }

        async function postJson(path, payload) {
            const response = await fetch(path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await response.json();
            if (!response.ok || data.status === 'error') {
                throw new Error(data.message || `Request failed with status ${response.status}`);
            }
            return data;
        }

        async function fetchSettings() {
            const response = await fetch('/api/settings');
            if (!response.ok) {
                throw new Error(`Request failed with status ${response.status}`);
            }
            return response.json();
        }

        function applySettings(settings) {
            const ui = settings.ui || {};
            const receiver = settings.receiver || {};
            const transmitter = settings.transmitter || {};
            const telemetry = settings.telemetry || {};

            document.getElementById('update-interval').value = ui.update_interval_seconds ?? 2;
            document.getElementById('theme-select').value = (ui.theme || 'dark').toLowerCase();

            document.getElementById('receiver-frequency').value =
                receiver.frequency_mhz ?? telemetry.frequency_mhz ?? 145.8;
            document.getElementById('receiver-modulation').value =
                String(receiver.modulation || 'FM').toUpperCase();
            document.getElementById('receiver-bandwidth').value = receiver.bandwidth_khz ?? 25;

            document.getElementById('transmitter-frequency').value =
                transmitter.frequency_mhz ?? telemetry.tx_frequency_mhz ?? 145.2;
            document.getElementById('transmitter-power').value = transmitter.power_output_w ?? 10;
            document.getElementById('transmitter-status').value = transmitter.status || 'Standby';
        }

        async function loadAndApplySettings() {
            try {
                const settings = await fetchSettings();
                applySettings(settings);
                setStatus('Settings loaded from integration settings JSON.');
            } catch (err) {
                setStatus(`Failed to load settings: ${err.message}`, true);
            }
        }

        document.getElementById('general-settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const payload = {
                    update_interval_seconds: Number(document.getElementById('update-interval').value),
                    theme: document.getElementById('theme-select').value,
                };
                const data = await postJson('/api/settings/general', payload);
                applySettings(data.settings || {});
                setStatus(data.message || 'General settings saved.');
            } catch (err) {
                setStatus(`Failed to save general settings: ${err.message}`, true);
            }
        });

        document.getElementById('receiver-settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const payload = {
                    frequency_mhz: Number(document.getElementById('receiver-frequency').value),
                    modulation: document.getElementById('receiver-modulation').value,
                    bandwidth_khz: Number(document.getElementById('receiver-bandwidth').value),
                };
                const data = await postJson('/api/settings/receiver', payload);
                applySettings(data.settings || {});
                setStatus(data.message || 'Receiver settings saved.');
            } catch (err) {
                setStatus(`Failed to save receiver settings: ${err.message}`, true);
            }
        });

        document.getElementById('transmitter-settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const payload = {
                    frequency_mhz: Number(document.getElementById('transmitter-frequency').value),
                    power_output_w: Number(document.getElementById('transmitter-power').value),
                    status: document.getElementById('transmitter-status').value,
                };
                const data = await postJson('/api/settings/transmitter', payload);
                applySettings(data.settings || {});
                setStatus(data.message || 'Transmitter settings saved.');
            } catch (err) {
                setStatus(`Failed to save transmitter settings: ${err.message}`, true);
            }
        });

        loadAndApplySettings();
    </script>
</body>
</html>
