<!DOCTYPE html>
<html>

<head>
    <title>Ground Station Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        nav {
            background: #333;
            padding: 0;
            display: flex;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: white;
            padding: 15px 20px;
            display: inline-block;
            text-decoration: none;
            transition: background 0.3s;
        }

        nav a:hover {
            background: #555;
        }

        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            text-align: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .metric {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
            margin: 15px 0;
        }

        .label {
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card.full-width {
            grid-column: 1 / -1;
        }

        .passes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .passes-table th,
        .passes-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        .passes-table th {
            background: #444;
            font-weight: bold;
            color: #fff;
        }

        .passes-table tbody tr:hover {
            background: #333;
        }

        .passes-table td {
            color: #ccc;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/tracking">Tracking</a>
        <a href="/cameras">Cameras</a>
        <a href="/gallery">Gallery</a>
        <a href="/settings">Settings</a>
        <a href="/logs">Logs</a>
    </nav>

    <div class="content">
        <h1>🛰️ Ground Station Dashboard</h1>
        <div class="dashboard">
            <div class="card">
                <div class="label">Satellite</div>
                <div class="metric" id="satellite">--</div>
            </div>
            <div class="card">
                <div class="label">Azimuth / Elevation</div>
                <div class="metric" id="position">-- / --</div>
            </div>
            <div class="card">
                <div class="label">Signal Strength</div>
                <div class="metric" id="signal">--</div>
            </div>
            <div class="card">
                <div class="label">SNR</div>
                <div class="metric" id="snr">--</div>
            </div>
            <div class="card">
                <div class="label">Status</div>
                <div class="metric" id="status">--</div>
            </div>
            <div class="card">
                <div class="label">Data Rate</div>
                <div class="metric" id="datarate">--</div>
            </div>
        </div>

        <div class="card full-width">
            <div class="label">Upcoming Passes</div>
            <table class="passes-table">
                <thead>
                    <tr>
                        <th>Satellite</th>
                        <th>Rise Time</th>
                        <th>Max Elevation</th>
                        <th>Set Time</th>
                        <th>Duration (min)</th>
                    </tr>
                </thead>
                <tbody id="passes-list">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            const response = await fetch('/api/satellite-status');
            const data = await response.json();
            document.getElementById('satellite').textContent = data.satellite_name;
            document.getElementById('position').textContent = data.azimuth + '° / ' + data.elevation + '°';
            document.getElementById('signal').textContent = data.signal_strength + ' dBm';
            document.getElementById('snr').textContent = data.snr + ' dB';
            document.getElementById('status').textContent = data.communication_status;
            document.getElementById('datarate').textContent = data.data_rate + ' bps';
        }

        async function loadPasses() {
            try {
                const response = await fetch('/api/upcoming-passes');
                const passes = await response.json();
                const tbody = document.getElementById('passes-list');

                if (!passes.length) {
                    tbody.innerHTML = '<tr><td colspan="5">No passes available yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = passes.map(pass => `
                    <tr>
                        <td>${pass.satellite}</td>
                        <td>${pass.rise_time}</td>
                        <td>${pass.max_elevation ?? '--'}°</td>
                        <td>${pass.set_time ?? '--'}</td>
                        <td>${pass.duration ?? '--'}</td>
                    </tr>
                `).join('');
            } catch (_err) {
                document.getElementById('passes-list').innerHTML =
                    '<tr><td colspan="5">Unable to load pass predictions.</td></tr>';
            }
        }

        updateDashboard();
        loadPasses();
        setInterval(updateDashboard, 2000);
        setInterval(loadPasses, 30000);
    </script>
</body>

</html>
