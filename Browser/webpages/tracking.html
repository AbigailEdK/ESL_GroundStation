<!DOCTYPE html>
<html>
<head>
    <title>Satellite Tracking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; }
        nav { background: #333; padding: 0; display: flex; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; padding: 15px 20px; display: inline-block; text-decoration: none; transition: background 0.3s; }
        nav a:hover { background: #555; }
        .content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; text-align: center; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2 { margin-bottom: 15px; color: #fff; }
        .passes-table { width: 100%; border-collapse: collapse; }
        .passes-table th, .passes-table td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        .passes-table th { background: #444; font-weight: bold; color: #fff; }
        .passes-table tbody tr:hover { background: #333; }
        .passes-table td { color: #ccc; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/tracking">Tracking</a>
        <a href="/cameras">Cameras</a>
        <a href="/gallery">Gallery</a>
        <a href="/settings">Settings</a>
        <a href="/logs">Logs</a>
    </nav>

    <div class="content">
        <h1>🛰️ Satellite Tracking</h1>
        
        <div class="card">
            <h2>Upcoming Passes</h2>
            <table class="passes-table">
                <thead>
                    <tr>
                        <th>Satellite</th>
                        <th>Rise Time</th>
                        <th>Max Elevation</th>
                        <th>Set Time</th>
                        <th>Duration (min)</th>
                    </tr>
                </thead>
                <tbody id="passes-list">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadPasses() {
            const response = await fetch('/api/upcoming-passes');
            const passes = await response.json();
            const tbody = document.getElementById('passes-list');
            tbody.innerHTML = passes.map(pass => `
                <tr>
                    <td>${pass.satellite}</td>
                    <td>${pass.rise_time}</td>
                    <td>${pass.max_elevation}°</td>
                    <td>${pass.set_time}</td>
                    <td>${pass.duration}</td>
                </tr>
            `).join('');
        }
        loadPasses();
        setInterval(loadPasses, 30000);
    </script>
</body>
</html>
