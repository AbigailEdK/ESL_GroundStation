<!DOCTYPE html>
<html>
<head>
    <title>Camera Snapshots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a1a; 
            color: #fff; 
        }
        nav { 
            background: #333; 
            padding: 0; 
            display: flex;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a { 
            color: white; 
            padding: 15px 20px; 
            display: inline-block; 
            text-decoration: none;
            transition: background 0.3s;
        }
        nav a:hover { 
            background: #555; 
        }
        .content { 
            padding: 20px; 
            max-width: 1400px; 
            margin: 0 auto;
        }
        h1 { 
            margin-bottom: 20px; 
            text-align: center;
        }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            background: #00d4ff;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #00b0cc;
        }
        button.secondary {
            background: #444;
            color: #fff;
        }
        button.secondary:hover {
            background: #555;
        }
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .filter-group label {
            color: #aaa;
            font-weight: bold;
        }
        .filter-group input, .filter-group select {
            padding: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
        }
        .snapshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .snapshot-card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .snapshot-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 212, 255, 0.3);
        }
        .snapshot-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .snapshot-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .snapshot-image:hover::after {
            content: '🔍';
            position: absolute;
            font-size: 48px;
            background: rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .snapshot-info {
            padding: 15px;
            background: #222;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 13px;
        }
        .info-label {
            color: #aaa;
            font-weight: bold;
        }
        .info-value {
            color: #00d4ff;
            word-break: break-all;
        }
        .snapshot-actions {
            padding: 12px;
            background: #222;
            display: flex;
            gap: 8px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .snapshot-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            min-width: 80px;
        }
        .snapshot-actions button.delete {
            background: #f44336;
        }
        .snapshot-actions button.delete:hover {
            background: #da190b;
        }
        .snapshot-actions button.download {
            background: #4CAF50;
        }
        .snapshot-actions button.download:hover {
            background: #45a049;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state h2 {
            margin-bottom: 10px;
            color: #aaa;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-close:hover {
            color: #00d4ff;
        }
        .stats {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat-box {
            text-align: center;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 4px;
            border-left: 3px solid #00d4ff;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/tracking">Tracking</a>
        <a href="/cameras">Cameras</a>
        <a href="/gallery">Gallery</a>
        <a href="/settings">Settings</a>
        <a href="/logs">Logs</a>
    </nav>

    <div class="content">
        <h1>📷 Camera Snapshots</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="total-snapshots">0</div>
                <div class="stat-label">Total Snapshots</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="total-size">0</div>
                <div class="stat-label">Total Size (MB)</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="latest-time">--:--:--</div>
                <div class="stat-label">Latest Snapshot</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="loadSnapshots()">🔄 Refresh</button>
            <button class="secondary" onclick="deleteAllSnapshots()">🗑️ Delete All</button>
            <button class="secondary" onclick="downloadAllSnapshots()">⬇️ Download All</button>
            <div class="filter-group">
                <label>Filter by Camera:</label>
                <select id="camera-filter" onchange="filterSnapshots()">
                    <option value="">All Cameras</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="search-input" placeholder="Search snapshots..." onkeyup="searchSnapshots()">
            </div>
        </div>

        <div class="snapshots-grid" id="snapshots-grid">
            <div class="empty-state">
                <h2>No snapshots yet</h2>
                <p>Go to the Cameras page to take snapshots from your camera feeds</p>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="image-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="Snapshot">
        </div>
    </div>

    <script>
        let allSnapshots = [];

        async function loadSnapshots() {
            try {
                const response = await fetch('/api/snapshots');
                allSnapshots = await response.json();
                
                if (Array.isArray(allSnapshots) && allSnapshots.length > 0) {
                    renderSnapshots(allSnapshots);
                    updateStats();
                    updateCameraFilter();
                } else {
                    document.getElementById('snapshots-grid').innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <h2>No snapshots yet</h2>
                            <p>Go to the Cameras page to take snapshots from your camera feeds</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading snapshots:', error);
                document.getElementById('snapshots-grid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h2>Error loading snapshots</h2>
                        <p>${error}</p>
                    </div>
                `;
            }
        }

        function renderSnapshots(snapshots) {
            const grid = document.getElementById('snapshots-grid');
            
            if (snapshots.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h2>No snapshots match your filters</h2>
                        <p>Try adjusting your search or filters</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = snapshots.map(snap => `
                <div class="snapshot-card">
                    <div class="snapshot-image" onclick="openModal('${snap.path}')">
                        <img src="${snap.path}" alt="${snap.filename}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3EError%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="snapshot-info">
                        <div class="info-row">
                            <span class="info-label">Camera:</span>
                            <span class="info-value">${snap.camera_name}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Time:</span>
                            <span class="info-value">${snap.created_display}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Size:</span>
                            <span class="info-value">${snap.size_kb} KB</span>
                        </div>
                    </div>
                    <div class="snapshot-actions">
                        <button class="download" onclick="downloadSnapshot('${snap.filename}')">⬇️ Download</button>
                        <button class="delete" onclick="deleteSnapshot('${snap.filename}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const totalSnapshots = allSnapshots.length;
            const totalSize = (allSnapshots.reduce((sum, s) => sum + s.size, 0) / (1024 * 1024)).toFixed(2);
            const latestTime = allSnapshots.length > 0 
                ? new Date(allSnapshots[0].created).toLocaleTimeString() 
                : '--:--:--';

            document.getElementById('total-snapshots').textContent = totalSnapshots;
            document.getElementById('total-size').textContent = totalSize;
            document.getElementById('latest-time').textContent = latestTime;
        }

        function updateCameraFilter() {
            const cameras = [...new Set(allSnapshots.map(s => s.camera_name))];
            const filterSelect = document.getElementById('camera-filter');
            const currentValue = filterSelect.value;
            
            filterSelect.innerHTML = '<option value="">All Cameras</option>' +
                cameras.map(cam => `<option value="${cam}">${cam}</option>`).join('');
            
            filterSelect.value = currentValue;
        }

        function filterSnapshots() {
            const selectedCamera = document.getElementById('camera-filter').value;
            const filtered = selectedCamera 
                ? allSnapshots.filter(s => s.camera_name === selectedCamera)
                : allSnapshots;
            renderSnapshots(filtered);
        }

        function searchSnapshots() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allSnapshots.filter(s => 
                s.filename.toLowerCase().includes(query) ||
                s.camera_name.toLowerCase().includes(query) ||
                s.created_display.includes(query)
            );
            renderSnapshots(filtered);
        }

        async function deleteSnapshot(filename) {
            if (!confirm(`Delete snapshot ${filename}?`)) return;
            
            try {
                const response = await fetch('/api/delete-snapshot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: filename })
                });
                
                if (response.ok) {
                    loadSnapshots();
                } else {
                    alert('Failed to delete snapshot');
                }
            } catch (error) {
                alert('Error: ' + error);
            }
        }

        async function deleteAllSnapshots() {
            if (!confirm('Delete ALL snapshots? This cannot be undone.')) return;
            
            for (const snap of allSnapshots) {
                try {
                    await fetch('/api/delete-snapshot', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: snap.filename })
                    });
                } catch (error) {
                    console.error('Error deleting:', error);
                }
            }
            loadSnapshots();
        }

        function downloadSnapshot(filename) {
            window.location.href = `/api/download-snapshot/${encodeURIComponent(filename)}`;
        }

        async function downloadAllSnapshots() {
            if (allSnapshots.length === 0) {
                alert('No snapshots to download');
                return;
            }
            
            for (const snap of allSnapshots) {
                downloadSnapshot(snap.filename);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        function openModal(imagePath) {
            document.getElementById('modal-image').src = imagePath;
            document.getElementById('image-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.remove('active');
        }

        // Click outside modal to close
        document.getElementById('image-modal').addEventListener('click', (e) => {
            if (e.target.id === 'image-modal') {
                closeModal();
            }
        });

        // Load snapshots on page load
        loadSnapshots();

        // Auto-refresh every 10 seconds
        setInterval(loadSnapshots, 10000);
    </script>
</body>
</html>
